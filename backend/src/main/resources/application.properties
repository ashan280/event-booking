spring.application.name=event-booking-backend
server.port=8080

spring.datasource.url=${DB_URL:jdbc:h2:mem:eventdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
app.cors.allowed-origin=${FRONTEND_URL:http://localhost:5173}
app.jwt.secret=${APP_JWT_SECRET:event-booking-simple-jwt-secret-for-student-project-2026}
app.jwt.expiration-minutes=180
app.paypal.base-url=${APP_PAYPAL_BASE_URL:https://api-m.sandbox.paypal.com}
app.paypal.client-id=${APP_PAYPAL_CLIENT_ID:}
app.paypal.client-secret=${APP_PAYPAL_CLIENT_SECRET:}
app.paypal.currency=${APP_PAYPAL_CURRENCY:EUR}
