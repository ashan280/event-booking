spring.datasource.url=jdbc:h2:mem:eventdb;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
app.cors.allowed-origin=${FRONTEND_URL:http://localhost:5173}
app.jwt.secret=test-jwt-secret-for-event-booking-project-2026
app.jwt.expiration-minutes=180
